<!-- ============================================================
     CONDIVISIONE DATI CON FIREBASE (Firestore)
     Questo blocco fa salvare i dati nel cloud invece che
     nella memoria del telefono. NON modificare nulla qui sotto
     tranne la sezione "INCOLLA QUI LA TUA CONFIGURAZIONE".
     ============================================================ -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
(function () {
  /* ================================================
     ==  INCOLLA QUI LA TUA CONFIGURAZIONE FIREBASE ==
     ==  (la trovi nella console Firebase, vedi la  ==
     ==  guida allegata, Passo 2)                   ==
     ================================================ */
  var FIREBASE_CONFIG = {
    apiKey: "AIzaSyBh1PKBiRcnLS6MN7qK3rYaQ-OWIRmqtEU",
    authDomain: "registro-del-forno.firebaseapp.com",
    projectId: "registro-del-forno",
    storageBucket: "registro-del-forno.firebasestorage.app",
    messagingSenderId: "56003562605",
    appId: "1:56003562605:web:85863e7873aba9415f4364"
  };
  /* ====== FINE CONFIGURAZIONE — non toccare sotto ====== */

  var COLLEZIONE = "registro";      // nome della raccolta su Firestore
  var CHUNK = 700000;               // dimensione max per documento (per le foto)

  // Se la configurazione non è stata incollata, o Firebase non si carica
  // (es. niente internet), l'app continua a funzionare in locale come prima.
  if (typeof firebase === "undefined" || !firebase.initializeApp) return;
  if (String(FIREBASE_CONFIG.apiKey).indexOf("INCOLLA") === 0) {
    console.warn("Firebase non configurato: l'app usa la memoria locale.");
    return;
  }

  firebase.initializeApp(FIREBASE_CONFIG);
  var db = firebase.firestore();
  var auth = firebase.auth();
  try { db.enablePersistence({ synchronizeTabs: true }).catch(function(){}); } catch (e) {}

  var prontoResolve;
  var pronto = new Promise(function (r) { prontoResolve = r; });
  var scrittureRecenti = {};

  function segnaScrittura(id) { scrittureRecenti[id] = Date.now(); }
  function scrittaDaNoi(id) {
    var base = id.split("__k")[0];
    var t = scrittureRecenti[id] || scrittureRecenti[base];
    return t && (Date.now() - t < 20000);
  }

  function conRetry(fn) {
    return fn().catch(function () {
      return new Promise(function (r) { setTimeout(r, 800); }).then(fn);
    }).catch(function () {
      return new Promise(function (r) { setTimeout(r, 2000); }).then(fn);
    });
  }

  /* ---------- Adattatore storage: l'app lo usa automaticamente ---------- */
  window.storage = {
    get: function (chiave) {
      return pronto.then(function () {
        return conRetry(function () { return db.collection(COLLEZIONE).doc(chiave).get(); });
      }).then(function (snap) {
        if (!snap.exists) return null;
        var d = snap.data();
        if (!d.c) return { key: chiave, value: d.v, shared: false };
        var promesse = [];
        for (var i = 0; i < d.c; i++) {
          promesse.push(conRetry((function (j) {
            return function () { return db.collection(COLLEZIONE).doc(chiave + "__k" + j).get(); };
          })(i)));
        }
        return Promise.all(promesse).then(function (parti) {
          var v = parti.map(function (p) { return p.exists ? p.data().v : ""; }).join("");
          return { key: chiave, value: v, shared: false };
        });
      });
    },
    set: function (chiave, valore) {
      return pronto.then(function () {
        segnaScrittura(chiave);
        if (typeof valore !== "string") valore = String(valore);
        if (valore.length <= CHUNK) {
          return conRetry(function () {
            return db.collection(COLLEZIONE).doc(chiave).set({
              v: valore, c: 0, t: firebase.firestore.FieldValue.serverTimestamp()
            });
          });
        }
        var batch = db.batch();
        var n = Math.ceil(valore.length / CHUNK);
        for (var i = 0; i < n; i++) {
          batch.set(db.collection(COLLEZIONE).doc(chiave + "__k" + i),
                    { v: valore.slice(i * CHUNK, (i + 1) * CHUNK) });
        }
        batch.set(db.collection(COLLEZIONE).doc(chiave),
                  { c: n, t: firebase.firestore.FieldValue.serverTimestamp() });
        return conRetry(function () { return batch.commit(); });
      });
    },
    delete: function (chiave) {
      return pronto.then(function () {
        segnaScrittura(chiave);
        return conRetry(function () { return db.collection(COLLEZIONE).doc(chiave).get(); })
          .then(function (snap) {
            var batch = db.batch();
            if (snap.exists && snap.data().c) {
              for (var i = 0; i < snap.data().c; i++) {
                batch.delete(db.collection(COLLEZIONE).doc(chiave + "__k" + i));
              }
            }
            batch.delete(db.collection(COLLEZIONE).doc(chiave));
            return conRetry(function () { return batch.commit(); });
          });
      });
    },
    list: function () {
      return pronto.then(function () {
        return db.collection(COLLEZIONE).get();
      }).then(function (snap) {
        var chiavi = snap.docs.map(function (d) { return d.id; })
          .filter(function (id) { return id.indexOf("__k") === -1; });
        return { keys: chiavi, shared: false };
      });
    }
  };

  /* ---------- Schermata di accesso ---------- */
  var css = "position:fixed;inset:0;z-index:99999;background:#F6EFE2;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:24px;";
  var overlay = document.createElement("div");
  overlay.setAttribute("style", css);
  overlay.innerHTML =
    '<div style="width:100%;max-width:340px;background:#fff;border-radius:16px;padding:28px 22px;box-shadow:0 8px 30px rgba(43,32,22,.15);text-align:center">' +
    '<div style="font-size:34px">🍕</div>' +
    '<div style="font-size:19px;font-weight:700;color:#2B2016;margin:6px 0 2px">Il Registro del Forno</div>' +
    '<div style="font-size:13px;color:#7A6B58;margin-bottom:18px">Accedi per vedere i dati condivisi</div>' +
    '<input id="pzfb-email" type="email" placeholder="Email" autocomplete="username" style="width:100%;box-sizing:border-box;padding:12px;margin-bottom:10px;border:1px solid #D8CCB8;border-radius:10px;font-size:15px">' +
    '<input id="pzfb-pass" type="password" placeholder="Password" autocomplete="current-password" style="width:100%;box-sizing:border-box;padding:12px;margin-bottom:6px;border:1px solid #D8CCB8;border-radius:10px;font-size:15px">' +
    '<div id="pzfb-err" style="min-height:18px;font-size:12.5px;color:#C63B2E;margin-bottom:8px"></div>' +
    '<button id="pzfb-btn" style="width:100%;padding:13px;border:none;border-radius:10px;background:#C63B2E;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Entra</button>' +
    '<div id="pzfb-reset" style="margin-top:14px;font-size:12.5px;color:#7A6B58;text-decoration:underline;cursor:pointer">Password dimenticata?</div>' +
    "</div>";

  function mostraLogin() {
    if (!overlay.parentNode) document.body.appendChild(overlay);
    var btn = overlay.querySelector("#pzfb-btn");
    var err = overlay.querySelector("#pzfb-err");
    function accedi() {
      var email = overlay.querySelector("#pzfb-email").value.trim();
      var pass = overlay.querySelector("#pzfb-pass").value;
      if (!email || !pass) { err.textContent = "Inserisci email e password."; return; }
      btn.disabled = true; btn.textContent = "Accesso…"; err.textContent = "";
      auth.signInWithEmailAndPassword(email, pass).catch(function (e) {
        btn.disabled = false; btn.textContent = "Entra";
        err.textContent = (e && (e.code === "auth/invalid-credential" || e.code === "auth/wrong-password" || e.code === "auth/user-not-found"))
          ? "Email o password sbagliata." : "Errore di connessione. Riprova.";
      });
    }
    btn.onclick = accedi;
    overlay.querySelector("#pzfb-pass").onkeydown = function (e) { if (e.key === "Enter") accedi(); };
    overlay.querySelector("#pzfb-reset").onclick = function () {
      var email = overlay.querySelector("#pzfb-email").value.trim();
      if (!email) { err.textContent = "Scrivi prima la tua email qui sopra."; return; }
      auth.sendPasswordResetEmail(email).then(function () {
        err.style.color = "#3E7A3B"; err.textContent = "Email di recupero inviata!";
      }).catch(function () { err.textContent = "Impossibile inviare l'email."; });
    };
  }

  auth.onAuthStateChanged(function (utente) {
    if (utente) {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      prontoResolve();
      avviaAscolto();
    } else {
      mostraLogin();
    }
  });

  /* ---------- Avviso quando un socio modifica i dati ---------- */
  var ascoltoAvviato = false;
  function avviaAscolto() {
    if (ascoltoAvviato) return;
    ascoltoAvviato = true;
    var primo = true;
    db.collection(COLLEZIONE).onSnapshot(function (snap) {
      if (primo) { primo = false; return; }
      var daAltri = snap.docChanges().some(function (ch) {
        return !ch.doc.metadata.hasPendingWrites && !scrittaDaNoi(ch.doc.id);
      });
      if (daAltri) mostraAvvisoRicarica();
    }, function () {});
  }

  var avviso = null;
  function mostraAvvisoRicarica() {
    if (avviso) return;
    avviso = document.createElement("button");
    avviso.textContent = "🔄 Un socio ha aggiornato i dati — tocca per ricaricare";
    avviso.setAttribute("style",
      "position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:99998;" +
      "background:#2B2016;color:#fff;border:none;border-radius:999px;padding:12px 18px;" +
      "font-size:13.5px;font-family:system-ui,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.3);cursor:pointer");
    avviso.onclick = function () { location.reload(); };
    document.body.appendChild(avviso);
  }
})();
